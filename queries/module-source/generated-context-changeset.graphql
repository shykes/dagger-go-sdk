query GeneratedContextChangeset(
  $source: ModuleSourceID!
  $root: String!
  $before: String!
  $after: String!
) {
  loadModuleSourceFromID(id: $source) {
    generatedContextChangeset {
      before {
        directory(path: $root) {
          export(path: $before)
        }
      }
      after {
        directory(path: $root) {
          export(path: $after)
        }
      }
    }
  }
}
